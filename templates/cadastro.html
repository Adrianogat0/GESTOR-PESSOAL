{% extends "base.html" %}

{% block title %}Cadastro - Gestor Financeiro{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h2><i class="fas fa-user-plus"></i> Criar Conta</h2>
            <p>Cadastre-se para começar a usar o sistema</p>
        </div>
        
        <form action="/cadastro" method="POST" class="auth-form">
            <div class="form-group">
                <label for="nome"><i class="fas fa-user"></i> Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>
            </div>
            
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> E-mail</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="senha"><i class="fas fa-lock"></i> Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>
            </div>
            
            <button type="submit" class="btn-primary">
                <i class="fas fa-user-check"></i> Cadastrar
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Já tem conta? <a href="/login">Faça login aqui</a></p>
        </div>
    </div>
</div>
{% endblock %}
